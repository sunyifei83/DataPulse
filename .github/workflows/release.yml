name: Release Asset Repair

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild and re-upload assets for
        required: true
        type: string

jobs:
  repair-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package artifacts
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --wheel .

      - name: Verify existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}"

      - name: Upload rebuilt assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" dist/* --repo "${{ github.repository }}" --clobber
