name: governance-evidence

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  export-structured-release-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install DataPulse
        run: python -m pip install -e .

      - name: Export Structured Release Bundle
        run: python scripts/governance/export_datapulse_structured_release_bundle.py --out-dir out/ha_latest_release_bundle

      - name: Upload Governance Evidence
        uses: actions/upload-artifact@v4
        with:
          name: governance-evidence-bundle
          path: out/ha_latest_release_bundle
